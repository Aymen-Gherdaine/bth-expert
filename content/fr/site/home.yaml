faq:
  heading: Questions fréquentes
  items:
    - q: Quels projets nécessitent une étude d'impact en Algérie ?
      a: Tout projet figurant sur la liste du décret exécutif 07-145 (installations classées, carrières, projets hydrauliques, etc.) doit faire l'objet d'une EIE avant toute autorisation de construire ou d'exploiter.
    - q: Quel est le délai moyen pour obtenir une autorisation environnementale ?
      a: Comptez 2 à 6 mois selon l'ampleur du projet et la wilaya. L'étude elle-même prend de quelques semaines à plusieurs mois ; la phase d'enquête publique (pour les grands projets) allonge le délai.
    - q: BTH Expert intervient-il hors d'Oran ?
      a: 'Oui. Basé à Oran, nous intervenons dans toute l''Algérie, avec une concentration sur l''Ouest algérien : Oran, Mostaganem, Tlemcen, Sidi Bel Abbès, Relizane et les wilayas limitrophes.'
    - q: Qu'est-ce qu'un agrément Ministère de l'Environnement ?
      a: C'est une accréditation officielle délivrée par le Ministère de l'Environnement et de la Qualité de la Vie, attestant que le bureau d'études est habilité à réaliser des EIE et des études de dangers. BTH Expert est agréé.
    - q: Combien coûte une étude environnementale ?
      a: Le coût dépend du type d'étude, de l'ampleur du projet et de sa localisation. Nous établissons un devis personnalisé après une consultation initiale gratuite. Contactez-nous pour en discuter.
