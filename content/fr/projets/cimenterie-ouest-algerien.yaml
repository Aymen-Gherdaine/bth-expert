title: Audit HSE & conformité d'une cimenterie
excerpt: Diagnostic de conformité réglementaire et plan d'action HSE pour une cimenterie en exploitation.
mission:
  - Audit HSE
  - Conformité réglementaire
annee: '2021'
contexte: Un site cimentier en exploitation souhaitait sécuriser sa conformité réglementaire et structurer sa démarche HSE avant un audit des autorités compétentes.
demarche: Revue documentaire des autorisations et registres, visite de terrain, analyse des écarts au regard des exigences applicables et hiérarchisation des actions correctives.
resultat: Une grille de conformité, un registre des écarts et un plan d'action priorisé, support de la mise en conformité du site sur douze mois.
