secteur: Agriculture & Hydraulique
secteurSlug: agriculture-hydraulique
title: Étude d'impact d'un périmètre irrigué
excerpt: Évaluation environnementale et gestion de la ressource en eau pour un projet d'irrigation agricole.
mission:
  - Étude d'impact
  - Plan de gestion environnementale
annee: '2023'
contexte: Aménagement d'un périmètre irrigué mobilisant la ressource en eau sur une large emprise agricole, avec des enjeux sur les sols, les milieux naturels et les usages riverains.
demarche: Caractérisation de l'état initial, évaluation des effets sur la ressource en eau et les sols, et définition d'un programme de surveillance et de suivi environnemental.
resultat: Une étude d'impact validée et un plan de gestion environnementale opérationnel pour les phases travaux et exploitation.
