title: Étude d'impact d'un complexe pétrochimique
excerpt: EIE et étude de dangers pour une unité pétrochimique de la zone industrielle d'Arzew.
mission:
  - Étude d'impact
  - Étude de dangers
annee: '2022'
contexte: Implantation d'une nouvelle unité de transformation au sein d'une zone industrielle existante, à proximité de tiers et de milieux sensibles. Le projet, soumis à autorisation, nécessitait une évaluation environnementale et une caractérisation des risques majeurs avant instruction.
demarche: État initial du site, analyse des impacts sur l'air, l'eau et le milieu humain, modélisation des scénarios d'accident majeur (effets thermiques et de surpression) et définition des mesures d'atténuation et de maîtrise des risques.
resultat: Un dossier réglementaire complet — EIE et EDD — déposé auprès des autorités de wilaya, assorti d'un plan de gestion environnementale et d'un plan d'urgence interne.
