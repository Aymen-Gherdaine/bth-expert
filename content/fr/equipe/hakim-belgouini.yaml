name: Hakim Belgouini
role: Partenaire — BTH Consult
bio: Fort de plus de 40 ans d'expérience dans les études environnementales et les projets industriels en Algérie, Hakim Belgouini est un référent reconnu du secteur dans l'ouest et le centre du pays. À la tête de BTH Consult, il apporte à chaque mission un ancrage profond dans les réalités réglementaires algériennes et un réseau éprouvé auprès des administrations de wilaya et des maîtres d'ouvrage industriels.
credentials:
  - 40+ ans d'expérience
  - BTH Consult
  - Ouest · Centre Algérie
