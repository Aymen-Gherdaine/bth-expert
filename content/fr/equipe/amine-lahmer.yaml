name: Amine Lahmer
role: Co-fondateur & Gérant — Expert environnement
bio: Ingénieur en environnement, Amine Lahmer a acquis plusieurs années d'expérience terrain au sein de grands groupes d'ingénierie canadiens — notamment GHD et AtkinsRéalis — sur des projets industriels complexes en Algérie et au Canada. Certifié par l'Institut Algérien du Pétrole (Sonatrach/IAP), il maîtrise les référentiels réglementaires algériens et les standards internationaux en matière d'études d'impact, d'études de dangers et de gestion des risques industriels. Il co-fonde BTH Expert avec l'ambition d'apporter à l'industrie algérienne une expertise de premier plan forgée sur le terrain international.
credentials:
  - GHD · AtkinsRéalis
  - Certifié Sonatrach / IAP
  - Agrément Ministère de l'Environnement
