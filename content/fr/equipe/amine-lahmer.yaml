name: Amine Lahmer
role: Co-fondateur & Gérant — Expert environnement
bio: Ingénieur en environnement, titulaire d'une maîtrise de l'École de technologie supérieure (ÉTS, Montréal), Amine Lahmer a forgé son expertise au sein de grands groupes d'ingénierie internationaux — dont AtkinsRéalis — et sur des projets industriels complexes en Algérie et au Canada. Certifié par l'Institut Algérien du Pétrole (Sonatrach/IAP), il maîtrise les référentiels réglementaires algériens et les standards internationaux en matière d'études d'impact, d'études de dangers et de gestion des risques. Il co-fonde BTH Expert avec l'ambition d'apporter à l'industrie algérienne une expertise de premier plan, ancrée dans les meilleures pratiques mondiales.
credentials:
  - M.Sc. Génie de l'environnement — ÉTS Montréal
  - Certifié Sonatrach / IAP
  - Agrément Ministère de l'Environnement
