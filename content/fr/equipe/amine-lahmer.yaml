name: Amine Lahmer
role: Gérant — Expert environnement
bio: Ingénieur en environnement, Amine Lahmer dirige BTH Expert depuis sa fondation en 2009. Il supervise l'ensemble des études et garantit la conformité des livrables aux exigences réglementaires du Ministère de l'Environnement et de la Qualité de la Vie. Spécialiste des études d'impact sur l'environnement et des études de dangers pour les établissements industriels classés.
credentials:
  - Agrément Ministère de l'Environnement
  - Expert EIE
  - Expert EDD
