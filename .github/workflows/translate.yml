name: Traduction FR → AR/EN

on:
  push:
    branches: [main]
    paths:
      - "content/fr/**"
  workflow_dispatch:
    inputs:
      force:
        description: "Retraduire même les articles déjà traduits"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: translate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm ci

      - name: Régénérer dictionaries/fr.json
        run: npm run content:sync

      - name: Traduire FR → AR + EN
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run translate ${{ inputs.force && '-- --force' || '' }}

      - name: Commit et push si changement
        run: |
          git config user.name "bth-expert-bot"
          git config user.email "bot@bthexpert.dz"
          git add dictionaries/ar.json dictionaries/en.json content/ar content/en
          if git diff --cached --quiet; then
            echo "Aucun changement de traduction."
            exit 0
          fi
          git commit -m "chore: traduction auto FR → AR/EN [skip ci]"
          # main peut avoir avancé pendant la traduction (qui dure plusieurs
          # minutes) : on se resynchronise avant de pousser, avec quelques
          # tentatives, pour ne jamais perdre les traductions sur un push rejeté.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Push réussi (tentative $attempt)."
              exit 0
            fi
            echo "Push rejeté, resynchronisation et nouvelle tentative ($attempt)…"
            sleep 5
          done
          echo "::error::Échec du push des traductions après 5 tentatives."
          exit 1
